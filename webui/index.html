<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INI Excel 转换工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0f172a;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe3f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.22);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.25), transparent 28%),
        linear-gradient(145deg, #0f172a, #1e293b 55%, #334155);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: #fff;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 700;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.65;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      white-space: nowrap;
      font-size: 13px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .panel-body {
      padding: 24px;
    }

    .section {
      margin-bottom: 22px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
    }

    .mode-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mode-option {
      flex: 1 1 220px;
      position: relative;
    }

    .mode-option input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .mode-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: var(--panel-strong);
      transition: 0.2s ease;
    }

    .mode-option input:checked + .mode-card {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      background: rgba(239, 246, 255, 0.9);
    }

    .mode-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .mode-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field.single-action {
      grid-template-columns: 110px minmax(0, 1fr) auto;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: rgba(37, 99, 235, 0.7);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .path-input {
      font-family: Consolas, "Courier New", monospace;
      background: #f8fafc;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 600;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .status.success {
      background: #ecfdf5;
      color: #15803d;
    }

    .status.error {
      background: #fef2f2;
      color: #b91c1c;
    }

    .footnote {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }

      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .field,
      .field.single-action {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div>
        <h1>INI ⇄ Excel 转换工具</h1>
        <p>当前为 WebView HTML Demo 版界面。先用现代化静态页面快速完成替换，后续可平滑升级为 Vue 长期维护版本。</p>
      </div>
      <div class="badge">Demo UI · Ready for Vue</div>
    </div>

    <div class="panel">
      <div class="panel-body">
        <div class="section">
          <h2 class="section-title">转换类型</h2>
          <div class="mode-group">
            <label class="mode-option">
              <input type="radio" name="conversionType" value="ini_to_excel" checked />
              <div class="mode-card">
                <strong>INI 转 Excel</strong>
                <span>适用于一个 INI 文件或整个 table 目录导出为 Excel。</span>
              </div>
            </label>
            <label class="mode-option">
              <input type="radio" name="conversionType" value="excel_to_ini" />
              <div class="mode-card">
                <strong>Excel 转 INI</strong>
                <span>当前后端功能仍为占位实现，界面已预留完整流程。</span>
              </div>
            </label>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">输入与输出</h2>
          <div class="field">
            <label for="inputPath">输入路径</label>
            <input id="inputPath" class="path-input" type="text" placeholder="相对项目根目录路径" />
            <button id="pickInputFolderBtn" class="btn-secondary" type="button">选择文件夹</button>
            <button id="pickInputFileBtn" class="btn-secondary" type="button">选择文件</button>
          </div>

          <div class="field single-action">
            <label for="outputPath">输出目录</label>
            <input id="outputPath" class="path-input" type="text" placeholder="相对项目根目录路径" />
            <button id="pickOutputBtn" class="btn-secondary" type="button">浏览</button>
          </div>

          <div class="field single-action">
            <label for="outputFilename">输出文件名</label>
            <input id="outputFilename" type="text" placeholder="output" />
            <div id="extLabel" class="status">.xlsx</div>
          </div>
        </div>

        <div class="actions">
          <div id="status" class="status">就绪</div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button id="convertBtn" class="btn-success" type="button">开始转换</button>
            <button id="closeBtn" class="btn-primary" type="button">退出</button>
          </div>
        </div>

        <div class="footnote">
          目录建议：<strong>webui/</strong>。这个名字足够通用，既适合当前 HTML Demo，也适合后续迁移到 Vue、打包静态资源与扩展更多前端页面。
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      conversionType: 'ini_to_excel',
      ext: '.xlsx'
    };

    const els = {
      inputPath: document.getElementById('inputPath'),
      outputPath: document.getElementById('outputPath'),
      outputFilename: document.getElementById('outputFilename'),
      extLabel: document.getElementById('extLabel'),
      status: document.getElementById('status'),
      pickInputFolderBtn: document.getElementById('pickInputFolderBtn'),
      pickInputFileBtn: document.getElementById('pickInputFileBtn'),
      pickOutputBtn: document.getElementById('pickOutputBtn'),
      convertBtn: document.getElementById('convertBtn'),
      closeBtn: document.getElementById('closeBtn')
    };

    function setStatus(text, type = 'info') {
      els.status.textContent = text;
      els.status.className = 'status' + (type === 'success' ? ' success' : type === 'error' ? ' error' : '');
    }

    function syncModeUI() {
      state.ext = state.conversionType === 'ini_to_excel' ? '.xlsx' : '.ini';
      els.extLabel.textContent = state.ext;
      els.pickInputFolderBtn.textContent = '选择文件夹';
      setStatus('就绪');
    }

    async function callApi(method, payload = {}) {
      if (!window.pywebview || !window.pywebview.api || !window.pywebview.api[method]) {
        throw new Error('pywebview API 不可用，请确认已通过 Python WebView 启动。');
      }
      return window.pywebview.api[method](payload);
    }

    async function bootstrap() {
      try {
        const config = await callApi('get_initial_state');
        els.inputPath.value = config.input_path || '';
        els.outputPath.value = config.output_path || '';
        els.outputFilename.value = config.output_filename || 'output';
        state.conversionType = config.conversion_type || 'ini_to_excel';
        document.querySelector(`input[name="conversionType"][value="${state.conversionType}"]`).checked = true;
        syncModeUI();
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    }

    document.querySelectorAll('input[name="conversionType"]').forEach((radio) => {
      radio.addEventListener('change', async (event) => {
        state.conversionType = event.target.value;
        syncModeUI();
      });
    });

    els.pickInputFolderBtn.addEventListener('click', async () => {
      try {
        const result = await callApi('pick_input_folder');
        if (result && result.path !== undefined) {
          els.inputPath.value = result.path || '';
        }
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.pickInputFileBtn.addEventListener('click', async () => {
      try {
        const result = await callApi('pick_input_file', { conversion_type: state.conversionType });
        if (result && result.path !== undefined) {
          els.inputPath.value = result.path || '';
        }
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.pickOutputBtn.addEventListener('click', async () => {
      try {
        const result = await callApi('pick_output_folder');
        if (result && result.path !== undefined) {
          els.outputPath.value = result.path || '';
        }
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.convertBtn.addEventListener('click', async () => {
      els.convertBtn.disabled = true;
      setStatus('正在执行转换...');
      try {
        const result = await callApi('run_conversion', {
          input_path: els.inputPath.value,
          output_path: els.outputPath.value,
          output_filename: els.outputFilename.value,
          conversion_type: state.conversionType
        });
        setStatus(result.message || '转换完成', result.success ? 'success' : 'error');
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      } finally {
        els.convertBtn.disabled = false;
      }
    });

    els.closeBtn.addEventListener('click', async () => {
      try {
        await callApi('close_window');
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    window.addEventListener('pywebviewready', bootstrap);
  </script>
</body>
</html>
