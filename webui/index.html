<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INI Excel 转换工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #111827;
      --muted: #6b7280;
      --line: #dbe3ef;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.07), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .app {
      min-height: 100vh;
      padding: 22px 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .title-wrap h1 {
      margin: 0 0 6px;
      font-size: 30px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      color: #1f2937;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.08s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .icon-btn:hover {
      background: #ffffff;
      border-color: #c6d2e1;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.07);
    }

    .icon {
      width: 16px;
      text-align: center;
      font-size: 15px;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section {
      padding: 18px;
      border: 1px solid rgba(219, 227, 239, 0.95);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
    }

    .mode-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mode-option {
      flex: 1 1 220px;
      position: relative;
    }

    .mode-option input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .mode-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fff;
      transition: 0.2s ease;
    }

    .mode-option input:checked + .mode-card {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
      background: #eff6ff;
    }

    .mode-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .mode-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field.single-action {
      grid-template-columns: 110px minmax(0, 1fr) auto;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #d1d9e6;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: rgba(37, 99, 235, 0.7);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    input[type="text"][disabled] {
      background: #f4f7fb;
      color: #607087;
      cursor: not-allowed;
    }

    .path-input {
      font-family: Consolas, "Courier New", monospace;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e8edf4;
      color: #1f2937;
    }

    .btn-secondary:hover {
      background: #dde5ef;
    }

    .btn-success {
      background: var(--success);
      color: white;
      box-shadow: 0 8px 18px rgba(22, 163, 74, 0.2);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 600;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .status.success {
      background: #ecfdf5;
      color: #15803d;
    }

    .status.error {
      background: #fef2f2;
      color: #b91c1c;
    }

    .tooltip-wrap {
      position: relative;
      display: inline-flex;
    }

    .tooltip {
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      width: 260px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      line-height: 1.6;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.22);
      z-index: 10;
    }

    .tooltip-wrap:hover .tooltip,
    .tooltip-wrap:focus-within .tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    .bottom-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .tips-bar {
      display: flex;
      align-items: center;
      min-height: 52px;
      padding: 12px 16px;
      border: 1px solid rgba(191, 219, 254, 0.95);
      border-radius: 14px;
      background: linear-gradient(90deg, rgba(219, 234, 254, 0.9), rgba(239, 246, 255, 0.96));
      color: #1e3a8a;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .tips-label {
      flex: 0 0 auto;
      margin-right: 12px;
      font-size: 13px;
      font-weight: 700;
      color: #1d4ed8;
      letter-spacing: 0.2px;
    }

    .tip-display {
      min-width: 0;
      font-size: 13px;
      line-height: 1.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
    }

    .tip-display.flash {
      animation: tipFlash 0.8s ease;
    }

    @keyframes tipFlash {
      0% {
        opacity: 0.1;
        transform: translateY(4px);
      }
      45% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .dialog-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(17, 24, 39, 0.35);
      padding: 20px;
      z-index: 50;
    }

    .dialog-mask.show {
      display: flex;
    }

    .dialog {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
      overflow: hidden;
    }

    .dialog-header,
    .dialog-footer {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-footer {
      border-bottom: 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .dialog-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .dialog-desc {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .dialog-body {
      padding: 20px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .settings-help {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .settings-help a {
      color: var(--primary);
      text-decoration: none;
    }

    .settings-help a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }

      .topbar,
      .bottom-bar {
        flex-direction: column;
        display: flex;
        align-items: stretch;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .field,
      .field.single-action,
      .settings-row {
        grid-template-columns: 1fr;
      }

      .tip-display {
        white-space: normal;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>INI ⇄ Excel 转换工具</h1>
        <p>Warcraft III 结构数据与 Excel 互转</p>
      </div>
      <div class="top-actions">
        <button id="settingsBtn" class="icon-btn" type="button"><span class="icon">⚙</span><span>设置</span></button>
        <button id="helpBtn" class="icon-btn" type="button"><span class="icon">❓</span><span>帮助</span></button>
        <button id="githubBtn" class="icon-btn" type="button"><span class="icon">🔗</span><span>GitHub</span></button>
      </div>
    </div>

    <div class="workspace">
      <div class="section">
        <h2 class="section-title">转换类型</h2>
        <div class="mode-group">
          <label class="mode-option">
            <input type="radio" name="conversionType" value="ini_to_excel" checked />
            <div class="mode-card">
              <strong>INI 转 Excel</strong>
              <span>适用于一个 INI 文件、table 目录，或后续接入地图文件流程。</span>
            </div>
          </label>
          <label class="mode-option">
            <input type="radio" name="conversionType" value="excel_to_ini" />
            <div class="mode-card">
              <strong>Excel 转 INI</strong>
              <span>将编辑后的 Excel 内容回写为对应的 INI 结构数据。</span>
            </div>
          </label>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">输入与输出</h2>
        <div class="field">
          <label for="inputPath">输入路径</label>
          <input id="inputPath" class="path-input" type="text" placeholder="请通过右侧按钮选择" disabled />
          <button id="pickInputFolderBtn" class="btn-secondary" type="button">选择地图文件夹</button>
          <div class="tooltip-wrap">
            <button id="pickInputFileBtn" class="btn-secondary" type="button">选择地图</button>
            <div id="mapPickTooltip" class="tooltip">请先在设置中配置 w3x2lni 路径，之后才能直接选择 .w3x 地图文件。</div>
          </div>
        </div>

        <div class="field single-action">
          <label for="outputPath">输出目录</label>
          <input id="outputPath" class="path-input" type="text" placeholder="请通过右侧按钮选择" disabled />
          <button id="pickOutputBtn" class="btn-secondary" type="button">浏览</button>
        </div>

        <div class="field single-action">
          <label for="outputFilename">输出文件名</label>
          <input id="outputFilename" type="text" placeholder="output" />
          <div id="extLabel" class="status">.xlsx</div>
        </div>
      </div>

      <div class="bottom-bar">
        <div id="tipsBar" class="tips-bar" aria-live="polite">
          <div class="tips-label">使用建议</div>
          <div id="tipDisplay" class="tip-display">正在加载建议...</div>
        </div>
        <div class="actions">
          <div id="status" class="status">就绪</div>
          <button id="convertBtn" class="btn-success" type="button">开始转换</button>
          <button id="closeBtn" class="btn-primary" type="button">退出</button>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsDialogMask" class="dialog-mask" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="dialog-header">
        <h2 id="settingsTitle" class="dialog-title">设置</h2>
      </div>
      <div class="dialog-body">
        <div class="settings-row">
          <label for="w3x2lniPath">w3x2lni</label>
          <input id="w3x2lniPath" class="path-input" type="text" placeholder="未配置" disabled />
          <button id="pickW3x2lniBtn" class="btn-secondary" type="button">选择程序</button>
        </div>
        <div class="settings-help">
          如果提示w3x2lni损坏，请到<a href="https://github.com/sumneko/w3x2lni" target="_blank">w3x2lni</a>重新下载。
        </div>
      </div>
      <div class="dialog-footer">
        <button id="cancelSettingsBtn" class="btn-secondary" type="button">关闭</button>
        <button id="saveSettingsBtn" class="btn-primary" type="button">保存设置</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      conversionType: 'ini_to_excel',
      ext: '.xlsx',
      hasW3x2lni: false,
      w3x2lniPath: '',
      githubUrl: 'https://github.com/SoulQAQ/war3we-ini-excel-converter',
      helpUrl: 'http://soul2.cn/read/doc/war3we-ini-excel-converter/help.html',
      uiTips: [],
      tipIndex: 0,
      tipTimer: null
    };

    const els = {
      inputPath: document.getElementById('inputPath'),
      outputPath: document.getElementById('outputPath'),
      outputFilename: document.getElementById('outputFilename'),
      extLabel: document.getElementById('extLabel'),
      status: document.getElementById('status'),
      tipDisplay: document.getElementById('tipDisplay'),
      pickInputFolderBtn: document.getElementById('pickInputFolderBtn'),
      pickInputFileBtn: document.getElementById('pickInputFileBtn'),
      pickOutputBtn: document.getElementById('pickOutputBtn'),
      convertBtn: document.getElementById('convertBtn'),
      closeBtn: document.getElementById('closeBtn'),
      settingsBtn: document.getElementById('settingsBtn'),
      helpBtn: document.getElementById('helpBtn'),
      githubBtn: document.getElementById('githubBtn'),
      mapPickTooltip: document.getElementById('mapPickTooltip'),
      settingsDialogMask: document.getElementById('settingsDialogMask'),
      w3x2lniPath: document.getElementById('w3x2lniPath'),
      pickW3x2lniBtn: document.getElementById('pickW3x2lniBtn'),
      cancelSettingsBtn: document.getElementById('cancelSettingsBtn'),
      saveSettingsBtn: document.getElementById('saveSettingsBtn')
    };

    function setStatus(text, type = 'info') {
      els.status.textContent = text;
      els.status.className = 'status' + (type === 'success' ? ' success' : type === 'error' ? ' error' : '');
    }

    function renderCurrentTip(withFlash = true) {
      const tips = state.uiTips || [];
      const text = tips.length ? tips[state.tipIndex % tips.length] : '建议优先使用已拆解完成的 table 目录做通用规则验证。';
      els.tipDisplay.textContent = text;
      if (!withFlash) {
        return;
      }
      els.tipDisplay.classList.remove('flash');
      void els.tipDisplay.offsetWidth;
      els.tipDisplay.classList.add('flash');
    }

    function startTipRotation() {
      if (state.tipTimer) {
        clearInterval(state.tipTimer);
        state.tipTimer = null;
      }
      state.tipIndex = 0;
      renderCurrentTip(false);
      if ((state.uiTips || []).length <= 1) {
        return;
      }
      state.tipTimer = window.setInterval(() => {
        state.tipIndex = (state.tipIndex + 1) % state.uiTips.length;
        renderCurrentTip(true);
      }, 3600);
    }

    function updateMapPickerState() {
      const disabled = !state.hasW3x2lni || state.conversionType !== 'ini_to_excel';
      els.pickInputFileBtn.disabled = disabled;
      els.mapPickTooltip.classList.toggle('hidden', !disabled || state.conversionType !== 'ini_to_excel');
    }

    function syncModeUI() {
      state.ext = state.conversionType === 'ini_to_excel' ? '.xlsx' : '.ini';
      els.extLabel.textContent = state.ext;
      els.pickInputFolderBtn.textContent = state.conversionType === 'ini_to_excel' ? '选择地图文件夹' : '选择 Excel 文件';
      els.pickInputFileBtn.textContent = state.conversionType === 'ini_to_excel' ? '选择地图' : '选择 Excel';
      updateMapPickerState();
      setStatus('就绪');
    }

    function openSettingsDialog() {
      els.settingsDialogMask.classList.add('show');
      els.settingsDialogMask.setAttribute('aria-hidden', 'false');
      els.w3x2lniPath.value = state.w3x2lniPath || '';
    }

    function closeSettingsDialog() {
      els.settingsDialogMask.classList.remove('show');
      els.settingsDialogMask.setAttribute('aria-hidden', 'true');
    }

    async function callApi(method, payload = {}) {
      if (!window.pywebview || !window.pywebview.api || !window.pywebview.api[method]) {
        throw new Error('pywebview API 不可用，请确认已通过 Python WebView 启动。');
      }
      return window.pywebview.api[method](payload);
    }

    async function openLink(url) {
      try {
        await callApi('open_external_link', { url });
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    }

    async function bootstrap() {
      try {
        const config = await callApi('get_initial_state');
        els.inputPath.value = config.input_path || '';
        els.outputPath.value = config.output_path || '';
        els.outputFilename.value = config.output_filename || 'output';
        state.conversionType = config.conversion_type || 'ini_to_excel';
        state.hasW3x2lni = !!config.has_w3x2lni;
        state.w3x2lniPath = config.w3x2lni_path || '';
        state.uiTips = Array.isArray(config.ui_tips) ? config.ui_tips : [];
        state.helpUrl = config.help_url || state.helpUrl;
        state.githubUrl = config.github_url || state.githubUrl;

        const checkedRadio = document.querySelector(`input[name="conversionType"][value="${state.conversionType}"]`);
        if (checkedRadio) checkedRadio.checked = true;

        startTipRotation();
        syncModeUI();
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    }

    document.querySelectorAll('input[name="conversionType"]').forEach((radio) => {
      radio.addEventListener('change', async (event) => {
        state.conversionType = event.target.value;
        syncModeUI();
      });
    });

    els.pickInputFolderBtn.addEventListener('click', async () => {
      try {
        if (state.conversionType === 'excel_to_ini') {
          const result = await callApi('pick_input_file', { conversion_type: state.conversionType });
          if (result && result.path !== undefined) {
            els.inputPath.value = result.path || '';
          }
          return;
        }

        const result = await callApi('pick_input_folder');
        if (result && result.path !== undefined) {
          els.inputPath.value = result.path || '';
        }
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.pickInputFileBtn.addEventListener('click', async () => {
      if (els.pickInputFileBtn.disabled) return;
      try {
        const result = await callApi('pick_input_file', { conversion_type: state.conversionType });
        if (result && result.success === false && result.message) {
          setStatus(result.message, 'error');
          return;
        }
        if (result && result.path !== undefined) {
          els.inputPath.value = result.path || '';
        }
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.pickOutputBtn.addEventListener('click', async () => {
      try {
        const result = await callApi('pick_output_folder');
        if (result && result.path !== undefined) {
          els.outputPath.value = result.path || '';
        }
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.convertBtn.addEventListener('click', async () => {
      els.convertBtn.disabled = true;
      setStatus('正在执行转换...');
      try {
        const result = await callApi('run_conversion', {
          input_path: els.inputPath.value,
          output_path: els.outputPath.value,
          output_filename: els.outputFilename.value,
          conversion_type: state.conversionType
        });
        setStatus(result.message || '转换完成', result.success ? 'success' : 'error');
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      } finally {
        els.convertBtn.disabled = false;
      }
    });

    els.closeBtn.addEventListener('click', async () => {
      try {
        await callApi('close_window');
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.settingsBtn.addEventListener('click', async () => {
      try {
        const settings = await callApi('get_settings');
        state.w3x2lniPath = settings.w3x2lni_path || '';
        openSettingsDialog();
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.helpBtn.addEventListener('click', async () => {
      await openLink(state.helpUrl);
    });

    els.githubBtn.addEventListener('click', async () => {
      await openLink(state.githubUrl);
    });

    els.pickW3x2lniBtn.addEventListener('click', async () => {
      try {
        const result = await callApi('pick_w3x2lni_path');
        if (!result || result.cancelled) {
          return;
        }

        if (!result.success) {
          const shouldDownload = window.confirm((result.message || 'w3x2lni 已损坏。') + '\n\n点击“确定”前往下载页，点击“取消”返回。');
          if (shouldDownload && result.download_url) {
            await openLink(result.download_url);
          }
          return;
        }

        els.w3x2lniPath.value = result.w3x2lni_path || '';
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    els.cancelSettingsBtn.addEventListener('click', closeSettingsDialog);

    els.saveSettingsBtn.addEventListener('click', async () => {
      try {
        const result = await callApi('save_settings', {
          w3x2lni_path: els.w3x2lniPath.value
        });
        state.w3x2lniPath = result.w3x2lni_path || '';
        state.hasW3x2lni = !!result.has_w3x2lni;
        updateMapPickerState();
        setStatus(result.message || '设置已保存。', 'success');
        closeSettingsDialog();
      } catch (error) {
        setStatus(error.message || String(error), 'error');
      }
    });

    document.querySelectorAll('.settings-help a').forEach((link) => {
      link.addEventListener('click', async (event) => {
        event.preventDefault();
        const url = link.getAttribute('href');
        if (url) {
          await openLink(url);
        }
      });
    });

    window.addEventListener('pywebviewready', bootstrap);
  </script>
</body>
</html>
